<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256 256)">
    <!-- Lightning bolt representing "Flash" -->
    <path d="M -40 -120 L 40 -40 L 0 -20 L 50 80 L -30 20 L 10 0 L -50 -100 Z"
          fill="#fbbf24"
          stroke="#f59e0b"
          stroke-width="4"/>
    <!-- Location pin below the bolt -->
    <circle cx="0" cy="130" r="16" fill="#6366f1"/>
    <path d="M 0 90 L -20 130 L 20 130 Z" fill="#6366f1"/>
  </g>
</svg>
